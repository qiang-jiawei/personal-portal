    // ----- 工具函数 -----
    function getStars(tier) {
        if (tier >= 5) return '⭐⭐⭐⭐⭐';
        if (tier === 4) return '⭐⭐⭐⭐';
        if (tier === 3) return '⭐⭐⭐';
        if (tier === 2) return '⭐⭐';
        return '⭐';
    }

    function getTierColor(tier) {
        if (tier >= 5) return '#f59e0b';   // 金色
        if (tier === 4) return '#3b82f6';   // 蓝色
        if (tier === 3) return '#10b981';   // 绿色
        if (tier === 2) return '#8b5cf6';   // 紫色
        return '#94a3b8';                   // 灰色
    }

    // 渲染函数
    function render(filterStatus = 'all', searchText = '') {
        const grid = document.getElementById('cardGrid');
        const resultInfo = document.getElementById('resultInfo');

        let filtered = activitiesData.filter(item => {
            // 状态过滤
            if (filterStatus === 'done' && item.status !== 'done') return false;
            if (filterStatus === 'ongoing' && item.status !== 'ongoing') return false;
            // 搜索过滤
            if (searchText.trim()) {
                const kw = searchText.trim().toLowerCase();
                const inTitle = item.title.toLowerCase().includes(kw);
                const inDesc = item.description.toLowerCase().includes(kw);
                const inSub = item.subtitle.toLowerCase().includes(kw);
                if (!inTitle && !inDesc && !inSub) return false;
            }
            return true;
        });

        // 按含金量降序 (tier从高到低)，同tier按id升序
        filtered.sort((a, b) => {
            if (a.tier !== b.tier) return b.tier - a.tier;
            return a.id - b.id;
        });

        // 更新统计
        document.getElementById('totalCount').innerText = activitiesData.length;
        document.getElementById('doneCount').innerText = activitiesData.filter(d => d.status === 'done').length;
        document.getElementById('ongoingCount').innerText = activitiesData.filter(d => d.status === 'ongoing').length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-result">✨ 没有匹配的项目，试试其他关键词吧</div>`;
            resultInfo.innerText = '共 0 项';
            return;
        }

        let html = '';
        filtered.forEach(item => {
            const starStr = getStars(item.tier);
            const color = getTierColor(item.tier);
            const isDone = item.status === 'done';
            const badgeClass = isDone ? 'done' : 'ongoing';
            const badgeText = isDone ? '✅ 已完成' : '⏳ 进行中';

            // 完成时间显示
            let timeDisplay = '';
            if (isDone && item.completedDate) {
                timeDisplay = `📅 ${item.completedDate}`;
            } else if (!isDone) {
                timeDisplay = '⏳ 预计2026年';
            }

            html += `
                <div class="card">
                    <div class="tier-line" style="background:${color};"></div>
                    <div class="head">
                        <div class="title-area">
                            <h3>${item.title}</h3>
                            <div class="sub">${item.subtitle}</div>
                        </div>
                        <div class="stars">${starStr}</div>
                    </div>
                    <div class="desc">${item.description}</div>
                    <div class="footer-meta">
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                        <span class="time">${timeDisplay}</span>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;
        resultInfo.innerText = `共 ${filtered.length} 项`;
    }

    // ----- 绑定事件 -----
    document.addEventListener('DOMContentLoaded', () => {
        const statusSelect = document.getElementById('statusFilter');
        const searchInput = document.getElementById('searchInput');

        function update() {
            render(statusSelect.value, searchInput.value);
        }

        statusSelect.addEventListener('change', update);
        searchInput.addEventListener('input', update);

        // 初始渲染
        render('all', '');
    });
</script>
